name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Firebase CLI v15+ requires Node >=20; use Node 20 for compatibility
          node-version: '20'

      - name: Check Node.js & npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        # Use npm install when package-lock.json is not present in the repo.
        # For reproducible builds, consider committing package-lock.json and using `npm ci`.
        run: npm install

      - name: Write production env file
        # Create a Vite-friendly env file so values are embedded at build time.
        run: |
          cat > .env.production <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_CONTINUE_URL=${{ secrets.VITE_FIREBASE_CONTINUE_URL }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_USE_SAM=${{ secrets.VITE_USE_SAM }}
          EOF

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (service account)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_CONTINUE_URL: ${{ secrets.VITE_FIREBASE_CONTINUE_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USE_SAM: ${{ secrets.VITE_USE_SAM }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT secret. Create a service account key JSON and add it to repo secrets as FIREBASE_SERVICE_ACCOUNT.";
            exit 1;
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          # Deploy hosting to the specified project (production). To deploy to a preview channel, add --message or --only hosting:channel:deploy with --channelId.
          npx firebase-tools@latest deploy --only hosting --project "$VITE_FIREBASE_PROJECT_ID" --non-interactive

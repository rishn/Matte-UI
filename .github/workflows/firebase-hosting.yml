name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Firebase CLI v15+ requires Node >=20; use Node 20 for compatibility
          node-version: '20'

      - name: Check Node.js & npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        # Use npm install when package-lock.json is not present in the repo.
        # For reproducible builds, consider committing package-lock.json and using `npm ci`.
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
